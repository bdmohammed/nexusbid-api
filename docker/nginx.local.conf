worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ── Security ───────────────────────────────────────────────────────────────
  server_tokens off;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy strict-origin-when-cross-origin;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  # ── Upstream ───────────────────────────────────────────────────────────────
  upstream nexusbid_api {
    server api:3000;
    keepalive 32;
  }

  upstream dozzle_service {
    server dozzle:8080;
    keepalive 8;
  }

  # ── HTTP server (local / dev — no SSL required) ────────────────────────────
  server {
    listen 80;
    server_name localhost;

    client_max_body_size 10k;

    # ── Auth routes — stricter rate limit ────────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://nexusbid_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── API routes ────────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://nexusbid_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_connect_timeout 5s;
      proxy_read_timeout    30s;
    }

    # ── Deny all other traffic ─────────────────────────────────────────────
    location / {
      return 404;
    }
  }

  # ── Dozzle Logs Reverse Proxy (local / dev) ────────────────────────────────
  server {
    listen 80;
    server_name logs.localhost;

    # Allow large log streams (SSE)
    client_max_body_size 0;

    # Basic Authentication (matches production credentials locally)
    auth_basic           "NexusBid Log Viewer (Local)";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Disable response buffering for Server-Sent Events (SSE) log streaming
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

    location / {
      proxy_pass http://dozzle_service;
      proxy_http_version 1.1;
      
      # Connection upgrade headers for WebSockets / SSE
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
