worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ── Security headers ────────────────────────────────────────────────────────
  # server_tokens off: suppress nginx version from Server header and error pages.
  # Prevents attackers from targeting known vulnerabilities in specific versions.
  server_tokens off;

  # Hide the X-Powered-By header that Express sets by default.
  # Reduces information leakage about the backend runtime.
  proxy_hide_header X-Powered-By;

  # Prevent this API response from being embedded in an iframe anywhere.
  # SAMEORIGIN is fine for a full-stack app; for a pure API, DENY is stricter.
  add_header X-Frame-Options DENY always;

  # Prevent browsers from MIME-sniffing a response away from the declared
  # Content-Type. Stops content-type confusion attacks.
  add_header X-Content-Type-Options nosniff always;

  # Send only the origin (no path/query) when navigating cross-origin.
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # HSTS: tell browsers to always use HTTPS for this domain for 2 years.
  # includeSubDomains: covers subdomains too.
  # preload: eligible for browser HSTS preload lists (optional — submit to
  #          https://hstspreload.org once your domain is stable).
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Disable browser features that this pure API server never uses.
  # Reduces attack surface if a browser somehow renders an API response.
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

  # CSP for a pure API server: no resources should be loaded from any origin.
  # frame-ancestors 'none' provides clickjacking protection (replaces X-Frame-Options
  # in modern browsers but both are set for compatibility).
  add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

  # ── Rate limiting zones ─────────────────────────────────────────────────────
  # Binary IP addresses use ~6 KB per 1,000 IPs — 10 MB zone ≈ 1.6M IPs.
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=logs:10m rate=10r/s;

  # ── Upstream ────────────────────────────────────────────────────────────────
  upstream nexusbid_api {
    server api:3000;
    # keepalive: maintain 32 persistent connections to the API.
    # Avoids TCP handshake overhead on every proxied request.
    keepalive 32;
    keepalive_timeout 60s;
  }

  # ── Default Servers (Reject unknown domains/IPs) ────────────────────────────
  server {
    listen 80 default_server;
    server_name _;
    return 421;
  }

  server {
    listen 443 ssl default_server;
    ssl_reject_handshake on;
  }

  # ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
  server {
    listen 80;
    server_name api.staging.rfpnexa.com;  # Catch-all — replace with your domain in production
    return 301 https://$host$request_uri;
  }

  server {
    listen 80;
    server_name logs.staging.rfpnexa.com;
    return 301 https://$host$request_uri;
  }


  # ── Dozzle Logs HTTPS server (UAT/Staging only) ─────────────────────────────
  server {
    listen 443 ssl http2;
    server_name logs.staging.rfpnexa.com;

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/logs.staging.rfpnexa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logs.staging.rfpnexa.com/privkey.pem;


    # TLS 1.2 minimum. TLS 1.0 and 1.1 are deprecated (RFC 8996).
    ssl_protocols TLSv1.2 TLSv1.3;

    # ECDHE cipher suites with forward secrecy.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Session cache: avoids full TLS handshake on resumption.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Allow large log streams (SSE)
    client_max_body_size 0;

    # Rate limiting
    limit_req zone=logs burst=20 nodelay;
    limit_req_status 429;

    # Basic Authentication
    auth_basic           "NexusBid Log Viewer (Staging)";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Disable response buffering for Server-Sent Events (SSE) log streaming
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Security headers (Dozzle needs inline/eval scripts/styles for UI display)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data:; frame-ancestors 'none'" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

    location / {
      # Use Docker DNS resolver dynamically so Nginx boots even if dozzle container is offline/absent (e.g. in prod)
      resolver 127.0.0.11 valid=30s;
      set $dozzle_upstream http://dozzle:8080;
      proxy_pass $dozzle_upstream;
      
      proxy_http_version 1.1;
      
      # Connection upgrade headers for WebSockets / SSE
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }


  # ── HTTPS server ────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.staging.rfpnexa.com;  # Catch-all — replace with your domain in production

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/api.staging.rfpnexa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.staging.rfpnexa.com/privkey.pem;


    # TLS 1.2 minimum. TLS 1.0 and 1.1 are deprecated (RFC 8996).
    ssl_protocols TLSv1.2 TLSv1.3;

    # ECDHE cipher suites with forward secrecy.
    # AES-GCM for performance (hardware AES acceleration on modern CPUs).
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;  # TLS 1.3 negotiates ciphers client-first

    # Session cache: avoids full TLS handshake on resumption.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # Disable session tickets (forward secrecy risk)

    # ── Request size limit ────────────────────────────────────────────────────
    # The API accepts JSON bodies only (Express limit: 10kb).
    # File uploads go directly to S3 via presigned URLs — not through nginx.
    client_max_body_size 10k;

    # ── Auth routes — stricter rate limit ─────────────────────────────────────
    # 5 req/s with a burst of 10 before requests are rejected with 429.
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      limit_req_status 429;

      proxy_pass         http://nexusbid_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── API routes ────────────────────────────────────────────────────────────
    # 30 req/s with a burst of 50 before requests are rejected with 429.
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      limit_req_status 429;

      proxy_pass         http://nexusbid_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_connect_timeout 5s;
      proxy_read_timeout    30s;
    }

    # ── Deny all other traffic ────────────────────────────────────────────────
    # This is a pure API server. Any request not matching /api/ is rejected.
    location / {
      return 404;
    }
  }
}
