version: '3.9'

# ─── OPTIONAL: Local HTTPS Docker Compose Override ────────────────────────────
# Only needed if you want to test the full HTTPS flow locally.
# You MUST first generate self-signed certs:
#   .\scripts\gen-local-ssl.ps1
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ssl.yml up --build
#
# This mounts the real (SSL) nginx config and exposes port 443.
# Browser will show a certificate warning — click "Advanced → Proceed" to continue.
# ──────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro     # HTTPS nginx config
      - ./docker/ssl:/etc/nginx/ssl:ro                   # Self-signed certs
