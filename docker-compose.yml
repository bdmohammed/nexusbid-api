# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — NexusBid Development Stack
#
# Services: API (hot-reload) + PostgreSQL + Nginx (HTTP only)
#
# Usage:
#   docker compose up --build          # Start all services (runs migrations & seeds automatically on boot)
#   docker compose up                  # Start all services (no rebuild)
#   docker compose up db               # Start only PostgreSQL
#   docker compose down                # Stop and remove containers
#   docker compose down -v             # Stop and remove containers + volumes
#
# Environment loading:
#   .env         — shared defaults (loaded by docker-compose.yml)
#   .env.local   — local developer overrides (loaded by docker-compose.override.yml)
#
# The DOCKER=true variable triggers a host swap in src/config/env.ts:
#   DATABASE_URL: ...@localhost:... → ...@db:...
# This allows a single .env.local to work both natively and inside Docker.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  # Isolated bridge network. All services communicate by service name (e.g.
  # the API connects to Postgres via host "db", nginx proxies to "api:3000").
  nexusbid-net:
    driver: bridge

volumes:
  # Named volume: data persists across `docker compose down` restarts.
  # Use `docker compose down -v` to wipe the database during schema resets.
  postgres_data:

# Reusable configuration block for API services to avoid duplication
x-api-common: &api-common
  image: nexusbid-api-dev:latest
  env_file:
    - .env
  environment:
    NODE_ENV: local
    DOCKER: "true"
    DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-nexusbid}
  volumes:
    - ./src:/app/src
  networks:
    - nexusbid-net

services:

  # ── API Initialization (Migrations & Seeding) ──────────────────────────────
  # A short-lived service that runs once to migrate and seed the database.
  # Run explicitly via: docker compose --profile init run --rm api-init
  api-init:
    <<: *api-common
    profiles:
      - init
    restart: "no"
    command: ["sh", "-c", "npm run migration:run && npm run seed"]
    depends_on:
      db:
        condition: service_healthy

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    <<: *api-common
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      # Direct port exposure for debugging with Postman / curl (bypasses nginx).
      # Remove this in production — traffic should only enter through nginx.
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy   # Wait for postgres to accept connections
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      # Calls the real health endpoint — same check used by nginx before
      # routing traffic. start-period is long because ts-node compiles on
      # cold start before the HTTP server binds.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.nexusbid.env: "local"
      com.nexusbid.service: "api"
      com.nexusbid.team: "backend"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  # Development-only database. In production, use Amazon RDS.
  db:
    image: postgres:15-alpine
    environment:
      # Parameterised via shell / .env file. Defaults match the dev .env.example
      # values so the stack starts without any manual configuration.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nexusbid}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose to the host so developers can connect with TablePlus, psql, etc.
      # Not needed by the API itself (it uses the internal Docker network).
      - "${DB_PORT:-5432}:5432"
    networks:
      - nexusbid-net
    healthcheck:
      # pg_isready exits 0 only when Postgres is accepting connections.
      # The API's depends_on.condition: service_healthy waits for this.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nexusbid}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.nexusbid.env: "local"
      com.nexusbid.service: "db"
      com.nexusbid.team: "backend"

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  # HTTP-only reverse proxy for local development.
  # - Provides the same rate-limiting and routing as production
  # - No SSL required locally (use docker-compose.ssl.yml override for HTTPS)
  # Pinned to a specific major.minor version — avoids silent behaviour changes.
  nginx:
    image: nginx:1.28-alpine
    ports:
      - "80:80"
      # Port 443 not exposed here — HTTP only in local dev.
      # For HTTPS testing: docker compose -f docker-compose.yml -f docker-compose.ssl.yml up
    volumes:
      - ./docker/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ./docker/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - nexusbid-net
    depends_on:
      api:
        condition: service_healthy   # Wait for the API to pass its health check
      dozzle:
        condition: service_healthy   # Wait for Dozzle to pass its health check
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.nexusbid.env: "local"
      com.nexusbid.service: "nginx"
      com.nexusbid.team: "devops"

  # ── Dozzle Log Viewer (Local Dev) ─────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: nexusbid-dozzle-local
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nexusbid-net
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_NO_ANALYTICS: "true"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 100M
        reservations:
          memory: 50M
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.nexusbid.env: "local"
      com.nexusbid.service: "dozzle"
      com.nexusbid.team: "devops"

